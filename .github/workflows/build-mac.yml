name: Build macOS app

# Roda so quando voce clicar em "Run workflow" na aba Actions (manual).
on:
  workflow_dispatch:

jobs:
  build-mac:
    # macos-latest = Apple Silicon (M1/M2/M3/M4): fila bem menor que as maquinas Intel.
    runs-on: macos-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller

      - name: Gerar o RoboCaracolada.app
        run: pyinstaller --windowed --name RoboCaracolada robo_gui.py

      - name: Empacotar (.zip do app)
        run: |
          cd dist
          zip -r RoboCaracolada-mac.zip RoboCaracolada.app

      - name: Publicar o app para download
        uses: actions/upload-artifact@v4
        with:
          name: RoboCaracolada-mac
          path: dist/RoboCaracolada-mac.zip
