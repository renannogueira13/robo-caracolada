name: Abrir pacotes Caracolada

on:
  workflow_dispatch:            # botao "Run workflow" para testar na hora
  schedule:
    # a cada 10 minutos (horario UTC). O cooldown do site e 15 min;
    # rodar a cada 10 garante pegar o pacote logo que libera, mesmo com atraso do GitHub.
    - cron: '*/10 * * * *'

# nunca rodar duas execucoes ao mesmo tempo
concurrency:
  group: abrir-pacotes
  cancel-in-progress: false

jobs:
  abrir:
    runs-on: ubuntu-latest      # Linux: rapido e barato (nao precisa de Mac aqui)
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencia
        run: pip install --quiet requests

      - name: Abrir pacotes
        env:
          CARACOLADA_EMAIL: ${{ secrets.CARACOLADA_EMAIL }}
          CARACOLADA_SENHA: ${{ secrets.CARACOLADA_SENHA }}
        run: python abrir_pacote_nuvem.py
